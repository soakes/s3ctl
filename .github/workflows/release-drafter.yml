name: Release Drafter

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
      - ready_for_review

concurrency:
  group: release-drafter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update_release_draft:
    name: Update Release Draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository defaults
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Sync repository labels
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')

            const labels = JSON.parse(fs.readFileSync('.github/repository-labels.json', 'utf8'))

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                })

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                })
              } catch (error) {
                if (error.status !== 404) {
                  throw error
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                })
              }
            }

      - name: Auto-label pull request
        if: github.event_name == 'pull_request_target'
        uses: release-drafter/release-drafter/autolabeler@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine whether a release draft is needed
        if: github.event_name != 'pull_request_target'
        id: release_gate
        run: |
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done < <(bash scripts/next-release.sh)

      - name: Delete stale automated draft release
        if: github.event_name != 'pull_request_target' && steps.release_gate.outputs.release_required != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const defaultBranch = context.payload.repository.default_branch
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })

            const staleDrafts = releases.filter((release) => {
              const tagName = release.tag_name || ''
              const target = release.target_commitish || ''
              const body = release.body || ''

              return release.draft &&
                /^v\d+\.\d+\.\d+$/.test(tagName) &&
                (target === defaultBranch || target === `refs/heads/${defaultBranch}`) &&
                body.includes('## Included Changes')
            })

            if (staleDrafts.length === 0) {
              core.notice('No stale automated release drafts found.')
              return
            }

            for (const release of staleDrafts) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              })
              core.notice(`Deleted stale automated draft release ${release.tag_name} (#${release.id}).`)
            }

      - name: Update draft release
        if: github.event_name != 'pull_request_target' && steps.release_gate.outputs.release_required == 'true'
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
