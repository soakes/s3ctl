name: Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release tag to publish with the current workflow definition, for example v1.2.3 or v1.2.3-rc.1
        required: false
        type: string

concurrency:
  group: release-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: read

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure release tag points to main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          release_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_commit}" "refs/remotes/origin/${default_branch}"

  binaries:
    name: Build Binary ${{ matrix.label }}
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - label: linux/amd64
            goos: linux
            goarch: amd64
            goarm: ""
            artifact_name: s3ctl-linux-amd64
            deb_arch: amd64
          - label: linux/arm64
            goos: linux
            goarch: arm64
            goarm: ""
            artifact_name: s3ctl-linux-arm64
            deb_arch: arm64
          - label: linux/arm/v7
            goos: linux
            goarch: arm
            goarm: "7"
            artifact_name: s3ctl-linux-armv7
            deb_arch: armhf
          - label: darwin/amd64
            goos: darwin
            goarch: amd64
            goarm: ""
            artifact_name: s3ctl-darwin-amd64
            deb_arch: ""
          - label: darwin/arm64
            goos: darwin
            goarch: arm64
            goarm: ""
            artifact_name: s3ctl-darwin-arm64
            deb_arch: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Compute build metadata
        id: meta
        run: |
          {
            echo "version=${RELEASE_REF:-dev}"
            echo "commit=$(git rev-parse HEAD)"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: |
          mkdir -p dist
          make build-cross \
            VERSION=${{ steps.meta.outputs.version }} \
            COMMIT=${{ steps.meta.outputs.commit }} \
            BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            GOARM=${{ matrix.goarm }} \
            OUTPUT=dist/${{ matrix.artifact_name }}

      - name: Archive binary
        run: |
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Build Debian package
        if: ${{ matrix.deb_arch != '' }}
        run: |
          bash scripts/build-deb-package.sh \
            dist/${{ matrix.artifact_name }} \
            dist \
            "${{ steps.meta.outputs.version }}" \
            "${{ matrix.deb_arch }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

      - name: Upload Debian package artifact
        if: ${{ matrix.deb_arch != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.artifact_name }}
          path: dist/*.deb

  publish:
    name: Publish GitHub Release
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    needs:
      - binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.deb > s3ctl_SHA256SUMS

      - name: Classify release tag
        id: release
        run: |
          if [[ "${RELEASE_REF}" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_REF }}
          target_commitish: ${{ github.event.repository.default_branch }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/s3ctl_SHA256SUMS
