name: Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release tag to publish with the current workflow definition, for example v1.2.3 or v1.2.3-rc.1
        required: false
        type: string

concurrency:
  group: release-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

env:
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: read

jobs:
  verify-release-tag:
    name: Verify Release Tag
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure release tag points to main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          release_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_commit}" "refs/remotes/origin/${default_branch}"

  binaries:
    name: Build Binary ${{ matrix.label }}
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    runs-on: ubuntu-latest
    needs:
      - verify-release-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - label: linux/amd64
            goos: linux
            goarch: amd64
            goarm: ""
            artifact_name: s3ctl-linux-amd64
            deb_arch: amd64
          - label: linux/arm64
            goos: linux
            goarch: arm64
            goarm: ""
            artifact_name: s3ctl-linux-arm64
            deb_arch: arm64
          - label: linux/arm/v7
            goos: linux
            goarch: arm
            goarm: "7"
            artifact_name: s3ctl-linux-armv7
            deb_arch: armhf
          - label: darwin/amd64
            goos: darwin
            goarch: amd64
            goarm: ""
            artifact_name: s3ctl-darwin-amd64
            deb_arch: ""
          - label: darwin/arm64
            goos: darwin
            goarch: arm64
            goarm: ""
            artifact_name: s3ctl-darwin-arm64
            deb_arch: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Compute build metadata
        id: meta
        run: |
          {
            echo "version=${RELEASE_REF:-dev}"
            echo "commit=$(git rev-parse HEAD)"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: |
          mkdir -p dist
          make build-cross \
            VERSION=${{ steps.meta.outputs.version }} \
            COMMIT=${{ steps.meta.outputs.commit }} \
            BUILD_DATE=${{ steps.meta.outputs.build_date }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }} \
            GOARM=${{ matrix.goarm }} \
            OUTPUT=dist/${{ matrix.artifact_name }}

      - name: Archive binary
        run: |
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Build Debian package
        if: ${{ matrix.deb_arch != '' }}
        run: |
          bash scripts/build-deb-package.sh \
            dist/${{ matrix.artifact_name }} \
            dist \
            "${{ steps.meta.outputs.version }}" \
            "${{ matrix.deb_arch }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

      - name: Upload Debian package artifact
        if: ${{ matrix.deb_arch != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.artifact_name }}
          path: dist/*.deb

  publish:
    name: Publish GitHub Release
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_ref || '', 'v'))
    needs:
      - binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum -- *.tar.gz *.deb > SHA256SUMS

      - name: Classify release tag
        id: release
        run: |
          ref_name="${RELEASE_REF}"

          if [[ "${ref_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            prerelease=true
            stable_tag="${ref_name%-rc.*}"
            previous_tag="$(
              git tag --list "${stable_tag}-rc.*" --sort=-v:refname \
                | grep -vx "${ref_name}" \
                | head -n1 || true
            )"
            if [ -z "${previous_tag}" ]; then
              previous_tag="$(
                git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/v* \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | head -n1 || true
              )"
            fi
          elif [[ "${ref_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease=false
            previous_tag="$(
              git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/v* \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | grep -vx "${ref_name}" \
                | head -n1 || true
            )"
          else
            echo "Unsupported release tag format: ${ref_name}" >&2
            exit 1
          fi

          {
            echo "prerelease=${prerelease}"
            echo "previous_tag=${previous_tag}"
            echo "release_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        run: |
          mkdir -p release
          bash scripts/generate-release-notes.sh \
            "${{ steps.release.outputs.previous_tag }}" \
            "${{ steps.release.outputs.release_sha }}" \
            release/release-notes.md

      - name: Publish release
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          export GH_TOKEN="${DEFAULT_GH_TOKEN}"
          release_ref="${RELEASE_REF}"

          orphan_draft_ids="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.draft == true and .tag_name == \"${release_ref}\" and (.html_url | contains(\"/releases/tag/untagged-\"))) | .id" || true
          )"
          if [ -n "${orphan_draft_ids}" ]; then
            while IFS= read -r release_id; do
              [ -n "${release_id}" ] || continue
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            done <<< "${orphan_draft_ids}"
          fi

          mapfile -t assets < <(
            find dist -maxdepth 1 -type f \
              \( -name '*.tar.gz' -o -name '*.deb' -o -name 'SHA256SUMS' \) \
              | sort
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were staged for upload" >&2
            exit 1
          fi

          if gh release view "${release_ref}" >/dev/null 2>&1; then
            gh release upload "${release_ref}" --clobber "${assets[@]}"

            edit_args=(
              --draft=false
              --title "${release_ref}"
              --notes-file release/release-notes.md
            )
            if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
              edit_args+=(--prerelease)
            else
              edit_args+=(--latest)
            fi

            gh release edit "${release_ref}" "${edit_args[@]}"
            exit 0
          fi

          create_args=(
            --title "${release_ref}"
            --notes-file release/release-notes.md
          )
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            create_args+=(--prerelease)
          else
            create_args+=(--latest)
          fi

          gh release create "${release_ref}" "${assets[@]}" "${create_args[@]}"
