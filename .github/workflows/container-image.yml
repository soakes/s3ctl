name: Container Image

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Release tag to publish with the current workflow definition, for example v1.2.3 or v1.2.3-rc.1
        required: false
        type: string
  push:
    tags:
      - v*

concurrency:
  group: container-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_ref || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.sha }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}

permissions:
  contents: read

jobs:
  docker-build:
    name: Validate Container Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Compute build metadata
        id: prep
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          version="$(git describe --tags --always --dirty 2>/dev/null || printf '%s' dev)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=test-

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: s3ctl:test
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}

      - name: Smoke test container image
        run: |
          docker run --rm s3ctl:test --help | tee /tmp/s3ctl-help.txt
          grep -F 'Usage:' /tmp/s3ctl-help.txt
          grep -F 'Built-in scoped credential policy templates:' /tmp/s3ctl-help.txt

          docker run --rm s3ctl:test --version | tee /tmp/s3ctl-version.txt
          grep -F 'Version:' /tmp/s3ctl-version.txt

          docker run --rm s3ctl:test --version --output json > /tmp/s3ctl-version.json
          grep -F '"binary": "s3ctl"' /tmp/s3ctl-version.json
          grep -F '"version":' /tmp/s3ctl-version.json

          docker run --rm \
            -v "$PWD/examples:/examples:ro" \
            s3ctl:test \
            --config /examples/s3ctl.json \
            --dry-run \
            --output json > /tmp/s3ctl.json
          grep -F '"resource_count": 2' /tmp/s3ctl.json
          grep -F '"bucket_name": "app-data"' /tmp/s3ctl.json

          docker run --rm s3ctl:test \
            --bucket app-data \
            --create-scoped-credentials \
            --dry-run > /tmp/s3ctl-single.txt
          grep -F 'IAM user: app-data' /tmp/s3ctl-single.txt

      - name: Validate published platforms
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}

  verify-publish-ref:
    name: Verify Publish Ref
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.release_ref || '', 'v')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Ensure publish ref is trusted
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          default_branch="${DEFAULT_BRANCH}"
          publish_commit="$(git rev-parse HEAD^0)"

          git fetch origin "${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${publish_commit}" "refs/remotes/origin/${default_branch}"

  docker-publish:
    name: Publish GHCR Image
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.release_ref || '', 'v')))
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - verify-publish-ref
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.CHECKOUT_REF }}

      - name: Compute build metadata
        id: prep
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          version="$(git describe --tags --always --dirty 2>/dev/null || printf '%s' dev)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Compute publish tags
        id: publish_tags
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          ref_name="${RELEASE_REF}"

          if [[ "${ref_name}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc\.[0-9]+$ ]]; then
            {
              echo "tags<<EOF"
              printf '%s\n' \
                "${image}:${ref_name}" \
                "${image}:rc"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${ref_name}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            {
              echo "tags<<EOF"
              printf '%s\n' \
                "${image}:${ref_name}" \
                "${image}:${major}.${minor}.${patch}" \
                "${image}:${major}.${minor}" \
                "${image}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Unsupported publish ref: ${ref_name}" >&2
          exit 1

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.publish_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            VCS_REF=${{ steps.prep.outputs.source_sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
