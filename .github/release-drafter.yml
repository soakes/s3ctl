name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE ([#$NUMBER]($URL))"
change-title-escapes: '\<*_&@`'
exclude-labels:
  - skip-changelog
categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "Features"
    labels:
      - enhancement
  - title: "Fixes"
    labels:
      - bug
  - title: "Packaging and Delivery"
    labels:
      - container
      - packaging
  - title: "Release Workflow"
    labels:
      - release
  - title: "CI and Automation"
    labels:
      - ci
  - title: "Dependencies"
    collapse-after: 3
    labels:
      - dependencies
  - title: "Documentation"
    labels:
      - documentation
  - title: "Maintenance"
    labels:
      - maintenance
version-resolver:
  # Documentation, CI, and maintenance labels can still appear in grouped
  # release notes when they ship alongside release-bearing work, but they
  # should not bump the version on their own. `scripts/next-release.sh` is the
  # gating source of truth for whether a new draft or tag should exist at all.
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - container
      - packaging
      - dependencies
      - release
      - security
  default: patch
autolabeler:
  - label: breaking
    title:
      - '/^[A-Za-z0-9][A-Za-z0-9-]*(\([^)]+\))?!:/'
    body:
      - '/BREAKING CHANGE:/'
  - label: enhancement
    title:
      - '/^feat(\([^)]+\))?:/i'
    branch:
      - '/^feat\/.+/'
      - '/^feature\/.+/'
  - label: bug
    title:
      - '/^(fix|perf|revert)(\([^)]+\))?:/i'
      - '/^bugfix(\([^)]+\))?:/i'
    branch:
      - '/^fix\/.+/'
      - '/^bugfix\/.+/'
  - label: documentation
    title:
      - '/^docs(\([^)]+\))?:/i'
    files:
      - "README.md"
      - "docs/**/*"
      - "**/*.md"
  - label: ci
    title:
      - '/^ci(\([^)]+\))?:/i'
      - '/^fix\(ci\):/i'
  - label: release
    title:
      - '/^fix\(release\):/i'
      - '/^release(\([^)]+\))?:/i'
    files:
      - "scripts/next-release.sh"
      - "scripts/generate-release-notes.sh"
      - "scripts/wait-for-tag-workflow-runs.sh"
      - ".github/release-drafter.yml"
      - ".github/workflows/automated-release.yml"
      - ".github/workflows/container-image.yml"
      - ".github/workflows/promote-release.yml"
      - ".github/workflows/release-assets.yml"
      - ".github/workflows/release-drafter.yml"
  - label: dependencies
    branch:
      - '/^automation\/.+/'
      - '/^dependabot\/.+/'
    title:
      - '/^(deps|build|container)(\([^)]+\))?: bump /i'
      - '/^chore: refresh /i'
  - label: github-actions
    files:
      - ".github/workflows/**/*"
      - ".github/dependabot.yml"
  - label: docker
    files:
      - "Dockerfile"
      - ".dockerignore"
  - label: go
    files:
      - "go.mod"
      - "go.sum"
      - "cmd/**/*"
      - "internal/**/*"
  - label: container
    title:
      - '/^container(\([^)]+\))?:/i'
    files:
      - "Dockerfile"
  - label: packaging
    title:
      - '/^(packaging|build)(\([^)]+\))?:/i'
    files:
      - "scripts/build-apt-repository.sh"
      - "scripts/build-deb-package.sh"
      - ".github/workflows/pages-site.yml"
  - label: maintenance
    title:
      - '/^(chore|refactor|test)(\([^)]+\))?:/i'
template: |
  ## Included Changes

  $CHANGES

  ## Published Artifacts

  - Release binaries for `linux/amd64`, `linux/arm64`, `linux/arm/v7`, `darwin/amd64`, and `darwin/arm64`
  - Debian packages for `amd64`, `arm64`, and `armhf`
  - SHA256 checksums attached to the release
  - Container images published to `ghcr.io/soakes/s3ctl`
  - Stable releases refresh the GitHub Pages install hub and signed APT repository metadata when signing secrets are configured
