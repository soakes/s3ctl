name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE ([#$NUMBER]($URL))"
change-title-escapes: '\<*_&@`'
exclude-labels:
  - skip-changelog
categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "Features"
    labels:
      - enhancement
  - title: "Fixes"
    labels:
      - bug
  - title: "Container and Delivery"
    labels:
      - container
      - release
  - title: "CI and Automation"
    labels:
      - ci
  - title: "Dependencies"
    collapse-after: 3
    labels:
      - dependencies
  - title: "Documentation"
    labels:
      - documentation
  - title: "Maintenance"
    labels:
      - maintenance
version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - container
      - dependencies
      - release
      - security
  default: patch
autolabeler:
  - label: breaking
    title:
      - '/^[A-Za-z0-9][A-Za-z0-9-]*(\([^)]+\))?!:/'
    body:
      - '/BREAKING CHANGE:/'
  - label: enhancement
    title:
      - '/^feat(\([^)]+\))?:/i'
    branch:
      - '/^feat\/.+/'
      - '/^feature\/.+/'
  - label: bug
    title:
      - '/^(fix|perf|revert)(\([^)]+\))?:/i'
      - '/^bugfix(\([^)]+\))?:/i'
    branch:
      - '/^fix\/.+/'
      - '/^bugfix\/.+/'
  - label: documentation
    title:
      - '/^docs(\([^)]+\))?:/i'
    files:
      - "README.md"
      - "docs/**/*"
      - "**/*.md"
  - label: ci
    title:
      - '/^ci(\([^)]+\))?:/i'
      - '/^fix\(ci\):/i'
    files:
      - ".github/workflows/**/*"
      - ".github/dependabot.yml"
  - label: dependencies
    branch:
      - '/^automation\/.+/'
      - '/^dependabot\/.+/'
    title:
      - '/^(deps|build|container)(\([^)]+\))?: bump /i'
      - '/^chore: refresh /i'
  - label: github-actions
    files:
      - ".github/workflows/**/*"
      - ".github/dependabot.yml"
  - label: docker
    files:
      - "Dockerfile"
      - ".dockerignore"
  - label: go
    files:
      - "go.mod"
      - "go.sum"
      - "cmd/**/*"
      - "internal/**/*"
  - label: container
    title:
      - '/^container(\([^)]+\))?:/i'
    files:
      - "Dockerfile"
  - label: release
    title:
      - '/^release(\([^)]+\))?:/i'
    files:
      - ".github/release-drafter.yml"
      - ".github/workflows/release-drafter.yml"
      - ".github/workflows/release-assets.yml"
      - ".github/workflows/container-image.yml"
  - label: maintenance
    title:
      - '/^(chore|refactor|test)(\([^)]+\))?:/i'
template: |
  ## Included Changes

  $CHANGES

  ## Published Artifacts

  - Release binaries for `linux/amd64`, `linux/arm64`, `darwin/amd64`, and `darwin/arm64`
  - Checksums attached to the release
  - Container images published to `ghcr.io/soakes/s3ctl`
